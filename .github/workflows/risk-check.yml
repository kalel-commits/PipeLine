name: PipelineAI Risk Check

on:
  pull_request:
    branches: [main, master]

jobs:
  risk-check:
    name: "🤖 PipelineAI Risk Assessment"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather Commit Data
        id: gather
        run: |
          # Get PR commit stats
          ADDED=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | grep -oP '\d+ insertion' | grep -oP '\d+' || echo "0")
          REMOVED=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | grep -oP '\d+ deletion' | grep -oP '\d+' || echo "0")
          FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")

          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "removed=$REMOVED" >> $GITHUB_OUTPUT
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

      - name: Query PipelineAI Backend
        id: predict
        continue-on-error: true
        run: |
          # This requires the PipelineAI backend to be accessible
          # For self-hosted runners or when backend is deployed
          RESPONSE=$(curl -s -f "http://localhost:8000/predict/latest" 2>/dev/null || echo '{"risk": 0, "reason": "Backend not reachable", "risk_category": "Low"}')
          RISK=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('risk',0))")
          REASON=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('reason','N/A'))")
          CATEGORY=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('risk_category','Low'))")

          echo "risk=$RISK" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT
          echo "category=$CATEGORY" >> $GITHUB_OUTPUT

      - name: Post Risk Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const risk = parseFloat('${{ steps.predict.outputs.risk }}') || 0;
            const reason = '${{ steps.predict.outputs.reason }}' || 'N/A';
            const category = '${{ steps.predict.outputs.category }}' || 'Low';
            const riskPct = (risk * 100).toFixed(1);

            const emoji = category === 'High' ? '🔴' : category === 'Medium' ? '🟡' : '🟢';
            const header = category === 'High'
              ? '## ⚠️ High Risk PR Detected'
              : `## ${emoji} PipelineAI Risk Assessment`;

            const body = `${header}

            | Metric | Value |
            | --- | --- |
            | **Risk Score** | ${riskPct}% |
            | **Category** | ${emoji} ${category} |
            | **Reason** | ${reason} |
            | **Files Changed** | ${{ steps.gather.outputs.files_changed }} |
            | **Lines Added** | ${{ steps.gather.outputs.added }} |
            | **Lines Removed** | ${{ steps.gather.outputs.removed }} |

            ${category === 'High' ? '> **Action Required**: This PR has a high predicted failure risk. Consider splitting the changes or adding more tests before merging.' : '> ✅ This PR looks safe to merge based on ML analysis.'}

            ---
            *Powered by PipelineAI — Predictive CI/CD Intelligence*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Fail on High Risk
        if: steps.predict.outputs.category == 'High'
        run: |
          echo "❌ PipelineAI detected HIGH RISK (${{ steps.predict.outputs.risk }}). Blocking merge."
          echo "Reason: ${{ steps.predict.outputs.reason }}"
          exit 1
